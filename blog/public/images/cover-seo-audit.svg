<svg width="1400" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDFBF9"/>
      <stop offset="100%" style="stop-color:#DFF8EA"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="700" fill="url(#bg)"/>
  <!-- Grid pattern suggesting site architecture -->
  <g opacity="0.12" stroke="#000" stroke-width="1">
    <line x1="200" y1="100" x2="200" y2="600"/>
    <line x1="400" y1="100" x2="400" y2="600"/>
    <line x1="600" y1="100" x2="600" y2="600"/>
    <line x1="800" y1="100" x2="800" y2="600"/>
    <line x1="1000" y1="100" x2="1000" y2="600"/>
    <line x1="1200" y1="100" x2="1200" y2="600"/>
    <line x1="100" y1="200" x2="1300" y2="200"/>
    <line x1="100" y1="350" x2="1300" y2="350"/>
    <line x1="100" y1="500" x2="1300" y2="500"/>
  </g>
  <!-- Upward trend line -->
  <polyline points="200,520 400,460 600,380 800,320 1000,240 1200,160" fill="none" stroke="#A9F7B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data dots -->
  <circle cx="200" cy="520" r="8" fill="#A9F7B8"/>
  <circle cx="400" cy="460" r="8" fill="#A9F7B8"/>
  <circle cx="600" cy="380" r="8" fill="#A9F7B8"/>
  <circle cx="800" cy="320" r="8" fill="#A9F7B8"/>
  <circle cx="1000" cy="240" r="8" fill="#A9F7B8"/>
  <circle cx="1200" cy="160" r="8" fill="#A9F7B8"/>
  <!-- Magnifying glass icon -->
  <g transform="translate(650, 300)" opacity="0.08">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#000" stroke-width="12"/>
    <line x1="56" y1="56" x2="120" y2="120" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
