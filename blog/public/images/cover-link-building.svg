    <line x1="1020" y1="482" x2="746" y2="370" stroke="#000" stroke-width="2"/>
    <line x1="224" y1="350" x2="650" y2="350" stroke="#000" stroke-width="2"/>
    <line x1="1176" y1="350" x2="750" y2="350" stroke="#000" stroke-width="2"/>
    <!-- Secondary connections -->
    <line x1="370" y1="178" x2="484" y2="146" stroke="#000" stroke-width="1"/>
    <line x1="1030" y1="178" x2="916" y2="146" stroke="#000" stroke-width="1"/>
    <line x1="370" y1="522" x2="484" y2="554" stroke="#000" stroke-width="1"/>
