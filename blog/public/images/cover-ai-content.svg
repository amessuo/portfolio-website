<svg width="1400" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DBF3FF"/>
      <stop offset="100%" style="stop-color:#A9ADF9;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="700" fill="url(#bg)"/>
  <!-- Neural network nodes -->
  <g opacity="0.1">
    <!-- Layer 1 -->
    <circle cx="300" cy="200" r="20" fill="#000"/>
    <circle cx="300" cy="350" r="20" fill="#000"/>
    <circle cx="300" cy="500" r="20" fill="#000"/>
    <!-- Layer 2 -->
    <circle cx="550" cy="250" r="20" fill="#000"/>
    <circle cx="550" cy="450" r="20" fill="#000"/>
    <!-- Layer 3 -->
    <circle cx="800" cy="200" r="20" fill="#000"/>
    <circle cx="800" cy="350" r="20" fill="#000"/>
    <circle cx="800" cy="500" r="20" fill="#000"/>
    <!-- Layer 4 -->
    <circle cx="1050" cy="300" r="20" fill="#000"/>
    <circle cx="1050" cy="400" r="20" fill="#000"/>
    <!-- Connections -->
    <line x1="320" y1="200" x2="530" y2="250" stroke="#000" stroke-width="1"/>
    <line x1="320" y1="200" x2="530" y2="450" stroke="#000" stroke-width="1"/>
    <line x1="320" y1="350" x2="530" y2="250" stroke="#000" stroke-width="1"/>
    <line x1="320" y1="350" x2="530" y2="450" stroke="#000" stroke-width="1"/>
    <line x1="320" y1="500" x2="530" y2="250" stroke="#000" stroke-width="1"/>
    <line x1="320" y1="500" x2="530" y2="450" stroke="#000" stroke-width="1"/>
    <line x1="570" y1="250" x2="780" y2="200" stroke="#000" stroke-width="1"/>
    <line x1="570" y1="250" x2="780" y2="350" stroke="#000" stroke-width="1"/>
    <line x1="570" y1="250" x2="780" y2="500" stroke="#000" stroke-width="1"/>
    <line x1="570" y1="450" x2="780" y2="200" stroke="#000" stroke-width="1"/>
    <line x1="570" y1="450" x2="780" y2="350" stroke="#000" stroke-width="1"/>
    <line x1="570" y1="450" x2="780" y2="500" stroke="#000" stroke-width="1"/>
    <line x1="820" y1="200" x2="1030" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="820" y1="200" x2="1030" y2="400" stroke="#000" stroke-width="1"/>
    <line x1="820" y1="350" x2="1030" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="820" y1="350" x2="1030" y2="400" stroke="#000" stroke-width="1"/>
    <line x1="820" y1="500" x2="1030" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="820" y1="500" x2="1030" y2="400" stroke="#000" stroke-width="1"/>
  </g>
  <!-- Highlighted active nodes -->
  <circle cx="550" cy="250" r="16" fill="#A9ADF9" opacity="0.5"/>
  <circle cx="800" cy="350" r="16" fill="#A9ADF9" opacity="0.5"/>
  <circle cx="1050" cy="300" r="16" fill="#A9F7B8" opacity="0.5"/>
  <!-- Document lines suggesting content -->
  <g transform="translate(950, 150)" opacity="0.08">
    <rect width="280" height="360" rx="12" fill="none" stroke="#000" stroke-width="6"/>
    <line x1="30" y1="50" x2="250" y2="50" stroke="#000" stroke-width="6"/>
    <line x1="30" y1="90" x2="200" y2="90" stroke="#000" stroke-width="4"/>
    <line x1="30" y1="120" x2="230" y2="120" stroke="#000" stroke-width="4"/>
    <line x1="30" y1="150" x2="180" y2="150" stroke="#000" stroke-width="4"/>
    <line x1="30" y1="200" x2="250" y2="200" stroke="#000" stroke-width="6"/>
    <line x1="30" y1="240" x2="220" y2="240" stroke="#000" stroke-width="4"/>
    <line x1="30" y1="270" x2="240" y2="270" stroke="#000" stroke-width="4"/>
    <line x1="30" y1="300" x2="190" y2="300" stroke="#000" stroke-width="4"/>
  </g>
</svg>
